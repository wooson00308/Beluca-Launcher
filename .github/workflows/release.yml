name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Qt deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest --tb=short -q

  build:
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: BPELauncher-macOS
          - os: windows-latest
            artifact: BPELauncher-Windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build with PyInstaller
        run: pyinstaller installer/launcher.spec

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --deep -s - dist/BPELauncher

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../${{ matrix.artifact }}.zip BPELauncher

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\BPELauncher.exe -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
